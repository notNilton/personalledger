name: Deploy Mirante (Main)
run-name: Deploy Main - ${{ gitea.actor }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ========================================================
  # 1. Database Migrations
  # ========================================================
  check-prisma-changes:
    runs-on: ubuntu-latest
    outputs:
      PRISMA_CHANGED: ${{ steps.check.outputs.PRISMA_CHANGED }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Check for Prisma changes
        id: check
        run: |
          if git diff HEAD~1 HEAD -- packages/database/prisma/ | grep -q .; then
            echo "PRISMA_CHANGED=true" >> $GITHUB_OUTPUT
            echo "✅ Prisma changes detected"
          else
            echo "PRISMA_CHANGED=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No Prisma changes"
          fi

  deploy-prisma:
    needs: check-prisma-changes
    if: needs.check-prisma-changes.outputs.PRISMA_CHANGED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations
        run: |
          echo "🔄 Running migrations..."
          npm run db:deploy
          echo "✅ Migrations completed"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ========================================================
  # 2. Release Jobs (Sequential to avoid Git conflicts)
  # ========================================================
  release-backend:
    needs: [deploy-prisma]
    if: always() && (needs.deploy-prisma.result == 'success' || needs.deploy-prisma.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "bot@nilbyte.com"

      - name: Release Backend
        id: version
        run: |
          npx standard-version --path apps/backend --tag-prefix backend-v --message "chore(backend): release %s [skip ci]"
          git push --follow-tags origin HEAD:main
          VERSION=$(node -p "require('./apps/backend/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

  release-webapp:
    needs: [release-backend]
    if: always() && needs.release-backend.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "bot@nilbyte.com"

      - name: Pull latest changes
        run: git pull origin main

      - name: Release Webapp
        id: version
        run: |
          npx standard-version --path apps/webapp --tag-prefix webapp-v --message "chore(webapp): release %s [skip ci]"
          git push --follow-tags origin HEAD:main
          VERSION=$(node -p "require('./apps/webapp/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

  # ========================================================
  # 3. Build & Push (Parallel)
  # ========================================================
  build-backend:
    needs: [release-backend]
    if: always() && needs.release-backend.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Login to registry
        run: echo "${{ secrets.PACKAGES_TOKEN }}" | docker login gitea.nilbyte.com.br -u notNilton --password-stdin

      - name: Build and push backend
        run: |
          docker build -f apps/backend/Dockerfile \
            -t gitea.nilbyte.com.br/nilbyte-studios/mirante/backend:latest \
            -t gitea.nilbyte.com.br/nilbyte-studios/mirante/backend:${{ needs.release-backend.outputs.VERSION }} \
            .
          docker push gitea.nilbyte.com.br/nilbyte-studios/mirante/backend:latest
          docker push gitea.nilbyte.com.br/nilbyte-studios/mirante/backend:${{ needs.release-backend.outputs.VERSION }}

  build-webapp:
    needs: [release-webapp]
    if: always() && needs.release-webapp.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fix Docker Socket Permissions
        run: sudo chmod 666 /var/run/docker.sock

      - name: Login to registry
        run: echo "${{ secrets.PACKAGES_TOKEN }}" | docker login gitea.nilbyte.com.br -u notNilton --password-stdin

      - name: Build and push webapp
        run: |
          docker build -f apps/webapp/Dockerfile \
            --build-arg VITE_API_URL=https://mirante-api.nilbyte.com.br \
            --build-arg VITE_APP_VERSION=${{ needs.release-webapp.outputs.VERSION }} \
            -t gitea.nilbyte.com.br/nilbyte-studios/mirante/webapp:latest \
            -t gitea.nilbyte.com.br/nilbyte-studios/mirante/webapp:${{ needs.release-webapp.outputs.VERSION }} \
            .
          docker push gitea.nilbyte.com.br/nilbyte-studios/mirante/webapp:latest
          docker push gitea.nilbyte.com.br/nilbyte-studios/mirante/webapp:${{ needs.release-webapp.outputs.VERSION }}
