info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  auth: none
  body:
    type: json
    data: |-
      {
        "email": "user@example.com",
        "password": "password123"
      }

runtime:
  scripts:
    postResponse: |-
      if (res.status === 200 || res.status === 201) {
        bru.setEnvVar("accessToken", res.body.accessToken);
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
