info:
  name: Register
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/auth/register"
  body:
    type: json
    data: |-
      {
        "email": "{{userEmail}}",
        "password": "{{userPassword}}",
        "name": "Nilton Naab"
      }

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000
  scripts:
    - type: after-response
      code: |-
        // Token is delivered via HTTP-only cookie 'tallyoh_session'.
        // For Bruno testing, extract the token from the Set-Cookie header or use a pre-known token.
        if (res.status === 200 || res.status === 201) {
          const cookie = res.headers["set-cookie"] || "";
          const match = cookie.match(/tallyoh_session=([^;]+)/);
          if (match) {
            bru.setEnvVar("accessToken", match[1]);
          }
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
