info:
  name: Register
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/auth/register"
  auth: none
  body:
    type: json
    data: |-
      {
        "email": "user@example.com",
        "password": "password123",
        "name": "Test User"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
