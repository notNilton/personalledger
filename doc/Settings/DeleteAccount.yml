info:
  name: DeleteAccount
  type: http
  seq: 4

http:
  method: DELETE
  url: "{{baseUrl}}/api/v1/settings/account"
  body:
    type: json
    data: |-
      {
        "currentPassword": "{{userPassword}}"
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
